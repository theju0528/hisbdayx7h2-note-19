<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Precious ❤️</title>
<style>
body {
 margin: 0;
 font-family: 'Segoe UI', sans-serif;
 background: linear-gradient(to bottom right, #ffdde1, #ee9ca7);
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 overflow: hidden;
 color: #fff;
 text-align: center;
}
/* Card */
.card {
 background: rgba(0,0,0,0.3);
 padding: 25px;
 border-radius: 20px;
 width: 90%;
 max-width: 520px;
 backdrop-filter: blur(10px);
 z-index: 2;
}
img {
 width: 100%;
 border-radius: 15px;
 margin-bottom: 15px;
}
button {
 margin-top: 15px;
 padding: 10px 20px;
 border: none;
 border-radius: 20px;
 background: #fff;
 color: #ee9ca7;
 font-weight: bold;
 cursor: pointer;
}
/* Floating hearts */
.heart {
 position: absolute;
 bottom: -10px;
 font-size: 20px;
 animation: float 6s linear infinite;
}
@keyframes float {
 0% { transform: translateY(0); opacity: 1; }
 100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>
<body>
<div class="card">
<h2 id="title">Something is waiting for you... ⏳</h2>
<p id="countdown"></p>
<!-- 📸 ADD YOUR PHOTO LINK BELOW -->
<img src="https://i.ibb.co/JWbskhkk/IMG-2113.jpg" id="photo" style="display:none;">
<p id="text"></p>
<button id="btn" onclick="startMessage()" style="display:none;">Open ❤️</button>
</div>
<!-- 🎶 MUSIC -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>
<script>
// ⏳ SET YOUR TIME (YYYY-MM-DDTHH:MM:SS)
const targetDate = new Date("2026-03-19T00:00:00").getTime();
const countdownEl = document.getElementById("countdown");
const btn = document.getElementById("btn");
const interval = setInterval(() => {
 const now = new Date().getTime();
 const diff = targetDate - now;
 if (diff <= 0) {
   clearInterval(interval);
   countdownEl.innerHTML = "It's time ❤️";
   btn.style.display = "inline-block";
   document.getElementById("title").innerText = "Happy Birthday, My Precious ❤️";
 } else {
   const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
   const m = Math.floor((diff % (1000*60*60))/(1000*60));
   const s = Math.floor((diff % (1000*60))/1000);
   countdownEl.innerHTML = `${h}h ${m}m ${s}s`;
 }
}, 1000);
// 💌 TYPEWRITER MESSAGE
const message = `To my darling....
You came into my life so quietly,
but became the most beautiful part of it.
You are everything I hoped for,
everything I wished for…
and more.
I am so proud of you.
And I will keep choosing you,
always.
Happy Birthday Bujji ❤️ All happiness and success to you`;
let i = 0;
function startMessage() {
 document.getElementById("music").play();
 document.getElementById("btn").style.display = "none";
 document.getElementById("photo").style.display = "block";
 typeWriter();
 createHearts();
}
function typeWriter() {
 if (i < message.length) {
   document.getElementById("text").innerHTML += message.charAt(i);
   i++;
   setTimeout(typeWriter, 40);
 }
}
// 💞 FLOATING HEARTS
function createHearts() {
 setInterval(() => {
   const heart = document.createElement("div");
   heart.classList.add("heart");
   heart.innerHTML = "❤️";
   heart.style.left = Math.random() * 100 + "vw";
   heart.style.fontSize = (Math.random() * 20 + 10) + "px";
   document.body.appendChild(heart);
   setTimeout(() => {
     heart.remove();
   }, 6000);
 }, 300);
}
</script>
</body>
</html>
